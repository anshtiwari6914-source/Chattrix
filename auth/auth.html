<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login / Signup (ac.in only)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container {
        width: 350px;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; }
    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover { background: #0056b3; }
    .switch {
        margin-top: 10px;
        text-align: center;
        color: blue;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h2 id="title">Login</h2>

    <input type="email" id="email" placeholder="Enter ac.in Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button id="actionBtn">Login</button>

    <p class="switch" onclick="toggleMode()">Don't have an account? Create One</p>

    <p id="msg" style="color:red; text-align:center;"></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

<script src="auth.js"></script>


</body>
</html>
