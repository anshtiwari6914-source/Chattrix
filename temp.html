<div id="mainApp"></div>
<div id="onlineCount" style="font-weight:600; margin-top:10px;">
  People Online: 0
</div>
<body>
  <div class="app">
    <h1>Pair Video Call</h1>
    <div id="status">Connecting...</div>

    <div class="videos">
      <div>
        <h3>You</h3>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
      <div>
        <h3>Partner</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>

    <div class="chat-container">
  <div id="chatWindow"></div>

  <div class="chat-input">
    <input id="chatMsg" type="text" placeholder="Type a message…" />
    <button id="sendBtn">Send</button>
  </div>
</div>


    <div class="controls">
      <button id="startBtn">Start / Join</button>
      <button id="skipBtn" disabled>Skip</button>
      <button id="leaveBtn" disabled>Leave</button>
    </div>

    <div class="notes">
      <p>Open this page in two different browser windows (or share the URL). Use "Skip" to find a new partner.</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</div>
